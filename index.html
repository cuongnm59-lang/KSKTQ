// ===== HELPERS =====
function statusBadge(s){
  if(!s) return <span className="badge badge-gray">—</span>;
  if(s==='Đã hoàn thành'||s==='Đã giải quyết'||s==='Resolved'||s==='Đã phê duyệt') return <span className="badge badge-green">{s}</span>;
  if(s==='Đang triển khai'||s==='Đang xử lý'||s==='In progress') return <span className="badge badge-blue">{s}</span>;
  if(s==='Chưa bắt đầu'||s==='Not started') return <span className="badge badge-gray">{s}</span>;
  if(s==='Open') return <span className="badge badge-yellow">{s}</span>;
  if(s==='Active') return <span className="badge badge-green">{s}</span>;
  return <span className="badge badge-gray">{s}</span>;
}
function priorityBadge(p){
  if(p==='High') return <span className="badge badge-red">🔴 High</span>;
  if(p==='Medium') return <span className="badge badge-yellow">🟡 Medium</span>;
  return <span className="badge badge-gray">⚪ Low</span>;
}
function riskBadge(l){
  if(l==='High') return <span className="risk-level-high">● High</span>;
  if(l==='Medium') return <span className="risk-level-medium">● Medium</span>;
  return <span className="risk-level-low">● Low</span>;
}
function todayStr(){return new Date().toISOString().slice(0,10);}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function fmtDate(d){if(!d)return '—';const dt=new Date(d);return dt.toLocaleDateString('vi-VN');}
function wsBadge(ws){
  return <span className="ws-badge" style={{background:WS_BG[ws]||'#edf2f7',color:WS_COLORS[ws]||'#4a5568'}}>{ws}</span>;
}

// ===== MODAL =====
function Modal({show,onClose,title,children,footer}){
  if(!show) return null;
  return <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="modal">
      <div className="modal-header">
        <h3>{title}</h3>
        <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',fontSize:18,color:'#718096'}}>✕</button>
      </div>
      <div className="modal-body">{children}</div>
      {footer&&<div className="modal-footer">{footer}</div>}
    </div>
  </div>;
}

  const done=data.tasks.filter(t=>t.status==='Đã hoàn thành').length;
  const inprog=data.tasks.filter(t=>t.status==='Đang triển khai').length;
  const notstart=data.tasks.filter(t=>t.status==='Chưa bắt đầu').length;

  const highRisks=data.risks.filter(r=>r.muc_do==='High').length;

        <div className="card-title">📊 Tiến độ theo Workstream</div>

              <div className="progress-fill" style={{width:wsPct+'%',background:WS_COLORS[ws]||'#003087'}}/>
            </div>

          return <div key={t.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid #f0f4f8'}}>

                {overdue?`Quá ${-diff}ngày`:diff===0?'Hôm nay':`Còn ${diff}ngày`}
              </div>
              <div style={{fontSize:11,color:'#a0aec0'}}>{fmtDate(t.deadline)}</div>
            </div>
          </div>;
        })}
      </div>
    </div>

    {/* Sprint Overview */}
    <div className="card" style={{marginTop:0}}>
      <div className="card-title">🚀 Master Plan – Tổng quan Sprint</div>
      <div style={{overflowX:'auto'}}>
        <table className="table">
          <thead><tr>
            <th>ID</th><th>Sprint</th><th>Deliverable</th><th>Owner</th><th>KPI</th><th>Priority</th><th>Trạng thái</th>
          </tr></thead>
          <tbody>{data.planning.map(p=><tr key={p.id}>
            <td style={{fontFamily:'monospace',fontWeight:700,color:'#003087'}}>{p.id}</td>
            <td style={{fontSize:11,color:'#718096'}}>{p.sprint}</td>
            <td style={{fontWeight:600}}>{p.deliverable}</td>
            <td>{p.owner}</td>
            <td style={{fontSize:11}}>{p.kpi}</td>
            <td>{priorityBadge(p.priority)}</td>
            <td>{statusBadge(p.status)}</td>
          </tr>)}</tbody>
        </table>
      </div>
    </div>

    {/* Recent updates */}
    <div className="card">
      <div className="card-title">📝 Cập nhật gần đây</div>
      {data.updateLogs.slice(0,3).map(u=><div key={u.id} className="update-card" style={{'--uc':u.type==='weekly'?'#003087':'#276749'}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
          <span style={{fontWeight:700,fontSize:13}}>{u.title}</span>

          {u.tags.map(tag=><span key={tag} className="badge badge-blue">{tag}</span>)}
        </div>
      </div>)}
      {data.updateLogs.length===0&&<div className="empty-state"><p>Chưa có cập nhật nào</p></div>}
    </div>
  </div>;
}


// ===== TASKS =====
function Tasks({data,setData}){
  const [filterWS,setFilterWS]=useState('Tất cả');
  const [filterStatus,setFilterStatus]=useState('Tất cả');
  const [search,setSearch]=useState('');
  const [showModal,setShowModal]=useState(false);
  const [editTask,setEditTask]=useState(null);
  const [form,setForm]=useState({});

  const WS_LIST=['Tất cả',...[...new Set(data.tasks.map(t=>t.ws))]];
  const STATUS_LIST=['Tất cả','Đã hoàn thành','Đang triển khai','Chưa bắt đầu'];

  const filtered=data.tasks.filter(t=>{
    if(filterWS!=='Tất cả'&&t.ws!==filterWS) return false;
    if(filterStatus!=='Tất cả'&&t.status!==filterStatus) return false;
    if(search&&!t.task.toLowerCase().includes(search.toLowerCase())&&!t.pic.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  function openAdd(){setForm({ws:'Quản lý dự án',task:'',pic_dept:'',pic:'',support:'',deadline:'',output:'',status:'Chưa bắt đầu'});setEditTask(null);setShowModal(true);}
  function openEdit(t){setForm({...t});setEditTask(t);setShowModal(true);}
  function save(){
    if(!form.task.trim()) return;
    if(editTask){
      setData(d=>({...d,tasks:d.tasks.map(t=>t.id===editTask.id?{...form,id:t.id}:t)}));
    } else {
      setData(d=>({...d,tasks:[...d.tasks,{...form,id:d.tasks.length+1}]}));
    }
    setShowModal(false);
  }
  function del(id){if(window.confirm('Xóa task này?')) setData(d=>({...d,tasks:d.tasks.filter(t=>t.id!==id)}));}
  function quickStatus(id,st){setData(d=>({...d,tasks:d.tasks.map(t=>t.id===id?{...t,status:st}:t)}));}

  return <div>
    <div className="page-header" style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
      <div><h1>✅ Checklist & Tasks</h1><p>{filtered.length} tasks • {data.tasks.filter(t=>t.status==='Đã hoàn thành').length} hoàn thành</p></div>
      <button className="btn btn-primary" onClick={openAdd}><i className="fa fa-plus"/>Thêm Task</button>
    </div>
    <div className="filter-bar">
      <input className="form-input" style={{width:220}} placeholder="🔍 Tìm task, người phụ trách..." value={search} onChange={e=>setSearch(e.target.value)}/>
      {STATUS_LIST.map(s=><span key={s} className={'chip'+(filterStatus===s?' active':'')} onClick={()=>setFilterStatus(s)}>{s}</span>)}
    </div>
    <div className="filter-bar" style={{marginTop:-6}}>
      {WS_LIST.map(ws=><span key={ws} className={'chip'+(filterWS===ws?' active':'')} onClick={()=>setFilterWS(ws)}>{ws}</span>)}
    </div>
    <div className="card" style={{padding:0,overflow:'hidden'}}>
      <table className="table">
        <thead><tr>
          <th>#</th><th>Workstream</th><th style={{minWidth:220}}>Task</th><th>PIC</th><th>Support</th><th>Deadline</th><th>Output</th><th>Trạng thái</th><th></th>
        </tr></thead>
        <tbody>{filtered.map(t=>{
          const today=new Date(); const dl=t.deadline?new Date(t.deadline):null;
          const overdue=dl&&t.status!=='Đã hoàn thành'&&dl<today;
          return <tr key={t.id} style={{background:overdue?'#fff5f5':''}}>
            <td style={{color:'#a0aec0',fontWeight:600}}>{t.id}</td>
            <td>{wsBadge(t.ws)}</td>
            <td style={{fontWeight:600,color:'#2d3748'}}>{t.task}</td>
            <td>
              <div style={{fontWeight:600,fontSize:13}}>{t.pic}</div>
              <div style={{fontSize:11,color:'#718096'}}>{t.pic_dept}</div>
            </td>
            <td style={{fontSize:12,color:'#718096'}}>{t.support}</td>
            <td style={{fontSize:12,color:overdue?'#c53030':'#4a5568',fontWeight:overdue?700:400}}>
              {t.deadline?fmtDate(t.deadline):'—'}{overdue&&' ⚠️'}
            </td>
            <td style={{fontSize:12,color:'#718096'}}>{t.output||'—'}</td>
            <td>
              <select className="form-select" style={{fontSize:12,padding:'3px 6px'}} value={t.status||'Chưa bắt đầu'} onChange={e=>quickStatus(t.id,e.target.value)}>
                <option>Đã hoàn thành</option>
                <option>Đang triển khai</option>
                <option>Chưa bắt đầu</option>
                <option>Bị chặn</option>
              </select>
            </td>
            <td>
              <div style={{display:'flex',gap:4}}>
                <button className="btn btn-outline btn-sm" onClick={()=>openEdit(t)}>✏️</button>
                <button className="btn btn-danger btn-sm" onClick={()=>del(t.id)}>🗑</button>
              </div>
            </td>
          </tr>;
        })}</tbody>
      </table>
      {filtered.length===0&&<div className="empty-state"><i className="fa fa-check-circle"/><p>Không tìm thấy task nào</p></div>}
    </div>

    <Modal show={showModal} onClose={()=>setShowModal(false)} title={editTask?'Sửa Task':'Thêm Task mới'}
      footer={<><button className="btn btn-outline" onClick={()=>setShowModal(false)}>Hủy</button><button className="btn btn-primary" onClick={save}>Lưu</button></>}>
      <div className="form-group">
        <label className="form-label">Workstream</label>
        <select className="form-select" value={form.ws||''} onChange={e=>setForm(f=>({...f,ws:e.target.value}))}>
          {Object.keys(WS_COLORS).map(ws=><option key={ws}>{ws}</option>)}
        </select>
      </div>
      <div className="form-group">
        <label className="form-label">Tên Task *</label>
        <input className="form-input" value={form.task||''} onChange={e=>setForm(f=>({...f,task:e.target.value}))} placeholder="Nhập tên task..."/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <div className="form-group">
          <label className="form-label">Phòng ban PIC</label>
          <input className="form-input" value={form.pic_dept||''} onChange={e=>setForm(f=>({...f,pic_dept:e.target.value}))}/>
        </div>
        <div className="form-group">
          <label className="form-label">Người phụ trách</label>
          <input className="form-input" value={form.pic||''} onChange={e=>setForm(f=>({...f,pic:e.target.value}))}/>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <div className="form-group">
          <label className="form-label">Support</label>
          <input className="form-input" value={form.support||''} onChange={e=>setForm(f=>({...f,support:e.target.value}))}/>
        </div>
        <div className="form-group">
          <label className="form-label">Deadline</label>
          <input type="date" className="form-input" value={form.deadline||''} onChange={e=>setForm(f=>({...f,deadline:e.target.value}))}/>
        </div>
      </div>
      <div className="form-group">
        <label className="form-label">Output kỳ vọng</label>
        <input className="form-input" value={form.output||''} onChange={e=>setForm(f=>({...f,output:e.target.value}))}/>
      </div>
      <div className="form-group">
        <label className="form-label">Trạng thái</label>
        <select className="form-select" value={form.status||'Chưa bắt đầu'} onChange={e=>setForm(f=>({...f,status:e.target.value}))}>
          <option>Đã hoàn thành</option><option>Đang triển khai</option><option>Chưa bắt đầu</option><option>Bị chặn</option>
        </select>
      </div>
    </Modal>
  </div>;
}

// ===== OKRs =====
function OKRs({data,setData}){
  const caps=['Dự án','Workstream','Kênh'];
  const capColors={'Dự án':'#003087','Workstream':'#276749','Kênh':'#975a16'};

  function updateActual(id,val){setData(d=>({...d,okrs:d.okrs.map(o=>o.id===id?{...o,actual:val}:o)}));}
  function updateBaseline(id,val){setData(d=>({...d,okrs:d.okrs.map(o=>o.id===id?{...o,baseline:val}:o)}));}

  return <div>
    <div className="page-header">
      <h1>🎯 OKR & KPI Tracking</h1>
      <p>Theo dõi mục tiêu và kết quả then chốt – cập nhật hàng tuần</p>
    </div>

    {caps.map(cap=>{
      const items=data.okrs.filter(o=>o.cap===cap);
      return <div key={cap}>
        <div style={{display:'flex',alignItems:'center',gap:10,margin:'20px 0 10px'}}>
          <div style={{width:4,height:20,background:capColors[cap],borderRadius:2}}/>
          <h2 style={{fontSize:15,fontWeight:700,color:capColors[cap]}}>{cap==='Dự án'?'🏢 Mục tiêu Dự án':cap==='Workstream'?'⚙️ Workstream KPIs':'📡 Kênh KPIs'}</h2>
        </div>
        {items.map(o=>{
          const hasActual=o.actual&&o.actual!=='';
          return <div key={o.id} className="okr-card" style={{'--oc':capColors[cap]}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
              <div>
                <span style={{fontFamily:'monospace',fontSize:11,background:'#edf2f7',padding:'2px 6px',borderRadius:4,fontWeight:700,marginRight:8}}>{o.ma}</span>
                <span style={{fontWeight:700,fontSize:14,color:'#1a365d'}}>{o.muc_tieu}</span>
              </div>
              <div style={{display:'flex',gap:6,flexShrink:0,marginLeft:12}}>
                <span className="badge badge-gray">{o.freq}</span>
              </div>
            </div>
            <p style={{fontSize:13,color:'#4a5568',marginBottom:10}}>📌 {o.key_result}</p>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:10}}>
              <div>
                <div style={{fontSize:11,color:'#a0aec0',marginBottom:3}}>KPI Metric</div>
                <div style={{fontSize:12,fontWeight:600}}>{o.kpi}</div>
              </div>
              <div>
                <div style={{fontSize:11,color:'#a0aec0',marginBottom:3}}>Baseline</div>
                <input className="form-input" style={{padding:'4px 8px',fontSize:12}} value={o.baseline} onChange={e=>updateBaseline(o.id,e.target.value)} placeholder="Nhập baseline"/>
              </div>
              <div>
                <div style={{fontSize:11,color:'#a0aec0',marginBottom:3}}>Target</div>
                <div style={{fontSize:14,fontWeight:800,color:capColors[cap]}}>{o.target}</div>
              </div>
              <div>
                <div style={{fontSize:11,color:'#a0aec0',marginBottom:3}}>Actual</div>
                <input className="form-input" style={{padding:'4px 8px',fontSize:12,borderColor:hasActual?'#48bb78':'#e2e8f0'}} value={o.actual} onChange={e=>updateActual(o.id,e.target.value)} placeholder="Cập nhật..."/>
              </div>
            </div>
            <div style={{fontSize:11,color:'#a0aec0',marginTop:8}}>👤 {o.owner} • 📊 Nguồn: {o.source}</div>
          </div>;
        })}
      </div>;
    })}
  </div>;
}

function IssuesRisks({data,setData}){

  const [form,setForm]=useState({});
  const [type,setType]=useState('issue');

  function openAdd(t){setType(t);setEditItem(null);
    if(t==='issue') setForm({id:'IS'+(data.issues.length+1).toString().padStart(2,'0'),van_de:'',mo_ta:'',tac_dong:'Medium',bo_phan:'',ngay:todayStr(),status:'Đang xử lý',giai_phap:'',owner:'',ngay_dong:''});

        <p style={{fontSize:13,color:'#4a5568',marginBottom:8}}>{i.mo_ta}</p>
        <div style={{background:'#f7fafc',borderRadius:6,padding:10,marginBottom:8}}>
          <span style={{fontSize:11,fontWeight:700,color:'#276749'}}>💡 Giải pháp: </span>
          <span style={{fontSize:13}}>{i.giai_phap||'Chưa có giải pháp'}</span>

          {i.ngay_dong&&<span>✅ Đóng: {fmtDate(i.ngay_dong)}</span>}

            <input className="form-input" value={form.phe_duyet||''} onChange={e=>setForm(f=>({...f,phe_duyet:e.target.value}))}/></div>
          <div className="form-group"><label className="form-label">Trạng thái</label>
            <select className="form-select" value={form.status||'Chờ phê duyệt'} onChange={e=>setForm(f=>({...f,status:e.target.value}))}>

        </div>
      </>:<>
        <div className="form-group"><label className="form-label">Quyết định *</label>
          <input className="form-input" value={form.quyet_dinh||''} onChange={e=>setForm(f=>({...f,quyet_dinh:e.target.value}))}/></div>
        <div className="form-group"><label className="form-label">Lý do</label>
          <textarea className="form-textarea" value={form.ly_do||''} onChange={e=>setForm(f=>({...f,ly_do:e.target.value}))}/></div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <div className="form-group"><label className="form-label">Người quyết định</label>
            <input className="form-input" value={form.nguoi||''} onChange={e=>setForm(f=>({...f,nguoi:e.target.value}))}/></div>
          <div className="form-group"><label className="form-label">Ngày</label>
            <input type="date" className="form-input" value={form.ngay||todayStr()} onChange={e=>setForm(f=>({...f,ngay:e.target.value}))}/></div>
        </div>
        <div className="form-group"><label className="form-label">Ảnh hưởng đến</label>
          <input className="form-input" value={form.anh_huong||''} onChange={e=>setForm(f=>({...f,anh_huong:e.target.value}))}/></div>
      </>}
    </Modal>
  </div>;
}


// ===== UPDATE LOG =====
function UpdateLog({data,setData}){
  const [showModal,setShowModal]=useState(false);
  const [form,setForm]=useState({});
  const [filterType,setFilterType]=useState('Tất cả');

  function openAdd(){setForm({type:'daily',date:todayStr(),title:'',content:'',author:'Cường',tags:''});setShowModal(true);}
  function save(){
    if(!form.title||!form.content) return;
    const tags=form.tags?form.tags.split(',').map(t=>t.trim()).filter(Boolean):[];
    setData(d=>({...d,updateLogs:[{...form,tags,id:'UL'+uid()},...d.updateLogs]}));
    setShowModal(false);
  }
  function del(id){if(window.confirm('Xóa log này?')) setData(d=>({...d,updateLogs:d.updateLogs.filter(l=>l.id!==id)}));}

  const filtered=data.updateLogs.filter(l=>filterType==='Tất cả'||l.type===filterType);
  const typeColor={daily:'#276749',weekly:'#003087',milestone:'#6b46c1'};
  const typeLabel={daily:'Cập nhật ngày','weekly':'Báo cáo tuần','milestone':'Milestone'};

  return <div>
    <div className="page-header" style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
      <div><h1>📝 Update Log</h1><p>Nhật ký cập nhật hàng ngày & hàng tuần</p></div>
      <button className="btn btn-primary" onClick={openAdd}><i className="fa fa-plus"/>Thêm Cập nhật</button>
    </div>
    <div className="filter-bar">
      {['Tất cả','daily','weekly','milestone'].map(t=><span key={t} className={'chip'+(filterType===t?' active':'')} onClick={()=>setFilterType(t)}>
        {t==='Tất cả'?'Tất cả':typeLabel[t]||t}
      </span>)}
    </div>

    {filtered.length===0&&<div className="empty-state card"><i className="fa fa-journal-whills" style={{fontSize:40,color:'#cbd5e0',display:'block',marginBottom:12}}/><p>Chưa có log nào. Thêm cập nhật đầu tiên!</p></div>}

    {filtered.map(log=><div key={log.id} className="update-card" style={{'--uc':typeColor[log.type]||'#e2e8f0'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
        <div>
          <span className="badge" style={{background:typeColor[log.type]+'22',color:typeColor[log.type],marginRight:8}}>
            {typeLabel[log.type]||log.type}
          </span>
          <span style={{fontWeight:700,fontSize:14}}>{log.title}</span>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexShrink:0,marginLeft:12}}>
          <span style={{fontSize:12,color:'#a0aec0'}}>{fmtDate(log.date)} • {log.author}</span>
          <button className="btn btn-danger btn-sm" onClick={()=>del(log.id)}>🗑</button>
        </div>
      </div>
      <p style={{fontSize:13,color:'#4a5568',lineHeight:1.6,marginBottom:8}}>{log.content}</p>
      {log.tags&&log.tags.length>0&&<div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
        {log.tags.map(tag=><span key={tag} className="badge badge-blue">{tag}</span>)}
      </div>}
    </div>)}

    <Modal show={showModal} onClose={()=>setShowModal(false)} title="Thêm Cập nhật"
      footer={<><button className="btn btn-outline" onClick={()=>setShowModal(false)}>Hủy</button><button className="btn btn-primary" onClick={save}>Lưu</button></>}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
        <div className="form-group"><label className="form-label">Loại</label>
          <select className="form-select" value={form.type||'daily'} onChange={e=>setForm(f=>({...f,type:e.target.value}))}>
            <option value="daily">Cập nhật ngày</option>
            <option value="weekly">Báo cáo tuần</option>
            <option value="milestone">Milestone</option>
          </select></div>
        <div className="form-group"><label className="form-label">Ngày</label>
          <input type="date" className="form-input" value={form.date||todayStr()} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/></div>
        <div className="form-group"><label className="form-label">Người cập nhật</label>
          <input className="form-input" value={form.author||''} onChange={e=>setForm(f=>({...f,author:e.target.value}))}/></div>
      </div>
      <div className="form-group"><label className="form-label">Tiêu đề *</label>
        <input className="form-input" value={form.title||''} onChange={e=>setForm(f=>({...f,title:e.target.value}))} placeholder="VD: Báo cáo tuần 16-22/3"/></div>
      <div className="form-group"><label className="form-label">Nội dung cập nhật *</label>
        <textarea className="form-textarea" style={{minHeight:120}} value={form.content||''} onChange={e=>setForm(f=>({...f,content:e.target.value}))} placeholder="Tóm tắt các hoạt động, kết quả, vấn đề, kế hoạch tiếp theo..."/></div>
      <div className="form-group"><label className="form-label">Tags (phân cách bằng dấu phẩy)</label>
        <input className="form-input" value={form.tags||''} onChange={e=>setForm(f=>({...f,tags:e.target.value}))} placeholder="VD: SEO, Marketing, Tuần 2"/></div>
    </Modal>
  </div>;
}

// ===== BUDGET =====
function Budget({data,setData}){
  function update(id,field,val){setData(d=>({...d,budget:d.budget.map(b=>b.id===id?{...b,[field]:val}:b)}));}
  const total={planned:0,actual:0};
  data.budget.forEach(b=>{
    if(b.planned) total.planned+=parseFloat(b.planned.replace(/,/g,'')||0);
    if(b.actual) total.actual+=parseFloat(b.actual.replace(/,/g,'')||0);
  });

  return <div>
    <div className="page-header">
      <h1>💰 Budget System</h1>
      <p>Quản lý ngân sách và chi tiêu dự án KSKTQ</p>
    </div>
    <div className="stat-grid" style={{gridTemplateColumns:'repeat(3,1fr)'}}>
      <div className="stat-card" style={{'--color':'#003087'}}>
        <div className="label">Tổng kế hoạch</div>
        <div className="value" style={{fontSize:20}}>{total.planned?total.planned.toLocaleString('vi-VN'):'—'}</div>
        <div className="sub">VND</div>
      </div>
      <div className="stat-card" style={{'--color':'#276749'}}>
        <div className="label">Đã chi tiêu</div>
        <div className="value" style={{fontSize:20}}>{total.actual?total.actual.toLocaleString('vi-VN'):'—'}</div>
        <div className="sub">VND</div>
      </div>
      <div className="stat-card" style={{'--color':'#975a16'}}>
        <div className="label">Còn lại</div>
        <div className="value" style={{fontSize:20}}>{total.planned?((total.planned-total.actual)||0).toLocaleString('vi-VN'):'—'}</div>
        <div className="sub">VND</div>
      </div>
    </div>
    <div className="card" style={{padding:0,overflow:'hidden'}}>
      <table className="table">
        <thead><tr><th>#</th><th>Hạng mục</th><th>Kênh</th><th>Kế hoạch (VND)</th><th>Thực tế (VND)</th><th>Dự báo (VND)</th><th>Owner</th><th>% Sử dụng</th></tr></thead>
        <tbody>{data.budget.map(b=>{
          const planned=parseFloat(b.planned||0);
          const actual=parseFloat(b.actual||0);
          const pct=planned>0?Math.round(actual/planned*100):0;
          return <tr key={b.id}>
            <td style={{color:'#a0aec0'}}>{b.id}</td>
            <td style={{fontWeight:600}}>{b.hang_muc}</td>
            <td><span className="badge badge-blue">{b.kenh}</span></td>
            <td><input className="form-input" style={{padding:'4px 8px',fontSize:12}} value={b.planned} onChange={e=>update(b.id,'planned',e.target.value)} placeholder="Nhập..."/></td>
            <td><input className="form-input" style={{padding:'4px 8px',fontSize:12,borderColor:b.actual?'#48bb78':'#e2e8f0'}} value={b.actual} onChange={e=>update(b.id,'actual',e.target.value)} placeholder="Nhập..."/></td>
            <td><input className="form-input" style={{padding:'4px 8px',fontSize:12}} value={b.forecast} onChange={e=>update(b.id,'forecast',e.target.value)} placeholder="Nhập..."/></td>
            <td style={{fontSize:12}}>{b.owner}</td>
            <td>
              {b.planned?<>
                <div style={{fontSize:11,fontWeight:700,color:pct>100?'#c53030':'#276749',marginBottom:2}}>{pct}%</div>
                <div className="progress-bar"><div className="progress-fill" style={{width:Math.min(pct,100)+'%',background:pct>100?'#c53030':'#003087'}}/></div>
              </>:'—'}
            </td>
          </tr>;
        })}</tbody>
      </table>
    </div>
  </div>;
}

// ===== PRODUCTS =====
function Products({data,setData}){
  const [showModal,setShowModal]=useState(false);
  const [editItem,setEditItem]=useState(null);
  const [form,setForm]=useState({});

  function openEdit(p){setForm({...p});setEditItem(p);setShowModal(true);}
  function openAdd(){setForm({ma:'',ten:'',doi_tuong:'Nam/Nữ',gia:'',ta_q7:'✓',ta_caugiay:'✓',bvdk_hcm:'✓',bvdk_hn:'✓',status:'Active'});setEditItem(null);setShowModal(true);}
  function save(){
    if(!form.ten) return;
    if(editItem) setData(d=>({...d,products:d.products.map(p=>p.id===editItem.id?{...form,id:p.id}:p)}));
    else setData(d=>({...d,products:[...d.products,{...form,id:form.ma||uid()}]}));
    setShowModal(false);
  }

  return <div>
    <div className="page-header" style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
      <div><h1>📦 Sản phẩm & Gói khám</h1><p>Chuẩn hóa danh mục gói khám 4 cơ sở</p></div>
      <button className="btn btn-primary" onClick={openAdd}><i className="fa fa-plus"/>Thêm Gói</button>
    </div>
    <div className="card" style={{background:'#fffbeb',border:'1px solid #f6e05e',marginBottom:16,padding:14}}>
      <div style={{fontWeight:700,color:'#975a16',marginBottom:6}}>⚠️ Chỉ đạo Ban Giám đốc</div>
      <p style={{fontSize:13,color:'#4a5568'}}>Đồng bộ hoàn toàn danh mục, tên gọi, giá cho 4 cơ sở: <strong>TA Q7 (Sunrise City)</strong>, <strong>TA Cầu Giấy</strong>, <strong>BVĐK HCM</strong>, <strong>BVĐK HN</strong></p>
    </div>
    <div className="card" style={{padding:0,overflow:'hidden'}}>
      <table className="table">
        <thead><tr><th>Mã gói</th><th>Tên gói</th><th>Đối tượng</th><th>Giá (VND)</th><th>TA Q7</th><th>TA Cầu Giấy</th><th>BVĐK HCM</th><th>BVĐK HN</th><th>Trạng thái</th><th></th></tr></thead>
        <tbody>{data.products.map(p=><tr key={p.id}>
          <td style={{fontFamily:'monospace',fontWeight:700,fontSize:12,color:'#003087'}}>{p.ma}</td>
          <td style={{fontWeight:600}}>{p.ten}</td>
          <td style={{fontSize:12}}>{p.doi_tuong}</td>
          <td style={{fontWeight:700,color:'#276749'}}>{p.gia?p.gia+' ₫':'—'}</td>
          <td style={{textAlign:'center',fontSize:16,color:'#276749'}}>{p.ta_q7}</td>
          <td style={{textAlign:'center',fontSize:16,color:'#276749'}}>{p.ta_caugiay}</td>
          <td style={{textAlign:'center',fontSize:16,color:'#276749'}}>{p.bvdk_hcm}</td>
          <td style={{textAlign:'center',fontSize:16,color:'#276749'}}>{p.bvdk_hn}</td>
          <td>{statusBadge(p.status)}</td>
          <td><button className="btn btn-outline btn-sm" onClick={()=>openEdit(p)}>✏️</button></td>
        </tr>)}</tbody>
      </table>
    </div>
    <Modal show={showModal} onClose={()=>setShowModal(false)} title={editItem?'Sửa Gói khám':'Thêm Gói khám'}
      footer={<><button className="btn btn-outline" onClick={()=>setShowModal(false)}>Hủy</button><button className="btn btn-primary" onClick={save}>Lưu</button></>}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <div className="form-group"><label className="form-label">Mã gói</label>
          <input className="form-input" value={form.ma||''} onChange={e=>setForm(f=>({...f,ma:e.target.value}))}/></div>
        <div className="form-group"><label className="form-label">Đối tượng</label>
          <input className="form-input" value={form.doi_tuong||''} onChange={e=>setForm(f=>({...f,doi_tuong:e.target.value}))}/></div>
      </div>
      <div className="form-group"><label className="form-label">Tên gói *</label>
        <input className="form-input" value={form.ten||''} onChange={e=>setForm(f=>({...f,ten:e.target.value}))}/></div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <div className="form-group"><label className="form-label">Giá (VND)</label>
          <input className="form-input" value={form.gia||''} onChange={e=>setForm(f=>({...f,gia:e.target.value}))} placeholder="VD: 2,290,000"/></div>
        <div className="form-group"><label className="form-label">Trạng thái</label>
          <select className="form-select" value={form.status||'Active'} onChange={e=>setForm(f=>({...f,status:e.target.value}))}>
            <option>Active</option><option>Đang cập nhật</option><option>Inactive</option></select></div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        {[['ta_q7','TA Q7'],['ta_caugiay','TA Cầu Giấy'],['bvdk_hcm','BVĐK HCM'],['bvdk_hn','BVĐK HN']].map(([key,label])=><div key={key} className="form-group">
          <label className="form-label">{label}</label>
          <select className="form-select" value={form[key]||'✓'} onChange={e=>setForm(f=>({...f,[key]:e.target.value}))}>
            <option value="✓">✓ Có</option><option value="—">— Không</option><option value="⏳">⏳ Đang triển khai</option></select>
        </div>)}
      </div>
    </Modal>
  </div>;
}

// ===== MAIN APP =====
const TABS=[
  {id:'dashboard',icon:'fa-gauge',label:'Dashboard'},
  {id:'tasks',icon:'fa-check-square',label:'Checklist & Tasks'},
  {id:'planning',icon:'fa-calendar-days',label:'Master Plan'},
  {id:'okrs',icon:'fa-bullseye',label:'OKR & KPI'},
  {id:'team',icon:'fa-users',label:'Team & RACI'},
  {id:'issues',icon:'fa-triangle-exclamation',label:'Issues & Rủi ro'},
  {id:'changelog',icon:'fa-rotate',label:'Change Log'},
  {id:'updates',icon:'fa-pen-to-square',label:'Update Log'},
  {id:'budget',icon:'fa-wallet',label:'Ngân sách'},
  {id:'products',icon:'fa-box',label:'Gói khám'},
];

function App(){
  const [data,setData]=useState(INIT);
  const [tab,setTab]=useState('dashboard');

  const done=data.tasks.filter(t=>t.status==='Đã hoàn thành').length;
  const pct=Math.round(done/data.tasks.length*100);

  return <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
    <div className="sidebar">
      <div className="sidebar-logo">
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
          <div style={{width:36,height:36,borderRadius:8,background:'rgba(255,255,255,0.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>🏥</div>
          <div>
            <h2>KSKTQ 2026</h2>
            <p>BV Tâm Anh</p>
          </div>
        </div>
        <div style={{background:'rgba(255,255,255,0.1)',borderRadius:6,padding:'8px 10px'}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'rgba(255,255,255,0.7)',marginBottom:4}}>
            <span>Tiến độ tổng thể</span><span style={{fontWeight:700,color:'#fff'}}>{pct}%</span>
          </div>
          <div style={{background:'rgba(255,255,255,0.2)',borderRadius:99,height:6}}>
            <div style={{width:pct+'%',height:'100%',background:'#63b3ed',borderRadius:99}}/>
          </div>
        </div>
      </div>
      <div style={{overflowY:'auto',flex:1,paddingTop:8}}>
        {TABS.map(t=><div key={t.id} className={'nav-item'+(tab===t.id?' active':'')} onClick={()=>setTab(t.id)}>
          <i className={'fa '+t.icon}/><span>{t.label}</span>
        </div>)}
      </div>
      <div style={{padding:'12px 16px',borderTop:'1px solid rgba(255,255,255,0.1)',fontSize:11,color:'rgba(255,255,255,0.5)'}}>
        Khung 8S • PMO KSKTQ 2026
      </div>
    </div>
    <div className="main">
      {tab==='dashboard'&&<Dashboard data={data}/>}
      {tab==='tasks'&&<Tasks data={data} setData={setData}/>}
      {tab==='planning'&&<Planning data={data} setData={setData}/>}
      {tab==='okrs'&&<OKRs data={data} setData={setData}/>}
      {tab==='team'&&<Team data={data} setData={setData}/>}
      {tab==='issues'&&<IssuesRisks data={data} setData={setData}/>}
      {tab==='changelog'&&<ChangeLog data={data} setData={setData}/>}
      {tab==='updates'&&<UpdateLog data={data} setData={setData}/>}
      {tab==='budget'&&<Budget data={data} setData={setData}/>}
      {tab==='products'&&<Products data={data} setData={setData}/>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
